<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Works | Archie Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/works.css" />
    <link rel="icon" href="images/sLOGO.png" />
  </head>
  <body>
    <header class="container site-header">
      <a href="index.html" class="logo">
        <img src="images/LOGO.png" class="logo-img" alt="Archie Logo" />
        <span class="logo-text">ARCHIE</span>
      </a>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="開啟選單"
        aria-expanded="false"
        aria-controls="mobileMenu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="desktop-nav">
        <a href="index.html">HOME</a>
        <a href="works.html">WORKS</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </header>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">HOME</a>
      <a href="works.html">WORKS</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html">CONTACT</a>
    </div>

    <main class="container works-page">
      <section class="section">
        <h2 class="section-title">電影海報 Posters</h2>

        <div class="poster-grid">
          <button
            class="work-card"
            type="button"
            data-title="八歲 K9"
            data-category="電影海報 Posters"
            data-desc="這是電影主視覺與延伸設計專案，延伸出網路宣傳視覺與實體印刷物。"
            data-cover="images/八歲K9_banner.jpg"
            data-gallery='["images/八歲K9_英勇版.jpg","images/八歲K9_可愛版.jpg"]'
            data-trailer="https://www.youtube.com/embed/cDOwu5mFZRQ"
          >
            <div class="work-thumb work-thumb-poster">
              <div class="image-protect">
                <img src="images/八歲K9_英勇版.jpg" alt="八歲 K9" />
                <div class="image-shield"></div>
              </div>
            </div>
            <p class="work-name">八歲 K9</p>
          </button>

          <button
            class="work-card"
            type="button"
            data-title="突破:三千米的泳氣"
            data-category="電影海報 Posters"
            data-cover=""
            data-desc="此專案以電影海報為核心，包含海報、社群宣傳圖、票券與其他應用物。"
            data-gallery='["images/突破_01.jpg","images/突破_02.jpg","images/包廳現場.jpg","images/哈林哥節目.jpg","images/日月潭泳渡活動.jpg","images/粉絲見面會.jpg","images/簽名海報.jpg","images/合照.jpg"]'
            data-trailer="https://www.youtube.com/embed/gTyD-v5OfuE"
          >
            <div class="work-thumb work-thumb-poster">
              <div class="image-protect">
                <img src="images/突破_03.jpg" alt="突破:三千米的泳氣" />
                <div class="image-shield"></div>
              </div>
            </div>
            <p class="work-name">突破:三千米的泳氣</p>
          </button>

          <button
            class="work-card"
            type="button"
            data-title="其他電影"
            data-category="電影海報 Posters"
            data-desc="以主海報建立電影整體氛圍，並延伸出多項平面與數位應用。"
            data-cover=""
            data-gallery='["images/舞與舞者.jpg","images/耀青春.jpg"]'
          >
            <div class="work-thumb work-thumb-poster">
              <div class="image-protect">
                <img src="images/舞與舞者.jpg" alt="其他電影" />
                <div class="image-shield"></div>
              </div>
            </div>
            <p class="work-name">其他電影</p>
          </button>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">品牌設計 CIS Design</h2>

        <div class="cis-grid">
          <button
            class="work-card cis-card"
            type="button"
            data-title="ARUNBIT運動品牌"
            data-category="Corporate Identity System企業識別"
            data-desc="超越自己的極限，創造了令人驚艷的運動成就。速兔(ARUNBIT)象徵速度、力量和堅韌，而產品意旨幫助你發揮最佳狀態，感受兔子般的的活力和靈感，創造出無與倫比的表現。"
            data-cover="images/ARUNBIT.jpg"
            data-cover-mobile="images/ARUNBIT-mobile.jpg"
            data-gallery="[]"
          >
            <div class="work-thumb work-thumb-cis">
              <div class="image-protect">
                <img src="images/ARUNBIT-LOGO.jpg" alt="ARUNBIT運動品牌" />
                <div class="image-shield"></div>
              </div>
            </div>
            <p class="work-name">ARUNBIT運動品牌</p>
          </button>

          <button
            class="work-card cis-card"
            type="button"
            data-title="SPRING春暉映像"
            data-category="Corporate Identity System企業識別"
            data-desc="春暉映像相信，影像不是聲量的競賽，而是一種觀看方式的選擇。我們是在關注畫面中尚未被看見的情緒、節奏與層次，透過節制的光與精準的敘事，讓故事在對的時刻被理解，而非被消費。"
            data-cover="images/SPRING.jpg"
            data-cover-mobile="images/SPRING-mobile.jpg"
            data-gallery="[]"
          >
            <div class="work-thumb work-thumb-cis">
              <div class="image-protect">
                <img src="images/SPRING-LOGO.jpg" alt="SPRING春暉映像" />
                <div class="image-shield"></div>
              </div>
            </div>
            <p class="work-name">SPRING春暉映像</p>
          </button>
        </div>
      </section>
    </main>

    <!-- Overlay -->
    <div class="work-overlay" id="workOverlay" aria-hidden="true">
      <div class="overlay-backdrop" id="overlayBackdrop"></div>

      <div
        class="overlay-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="overlayTitle"
      >
        <button class="overlay-close" id="overlayClose" aria-label="關閉">
          ×
        </button>

        <div class="overlay-content">
          <div class="overlay-header">
            <p class="overlay-category" id="overlayCategory"></p>
            <h3 class="overlay-title" id="overlayTitle"></h3>
            <p class="overlay-desc" id="overlayDesc"></p>
          </div>

          <div class="overlay-main-image">
            <img id="overlayMainImage" src="" alt="" />
          </div>

          <div class="overlay-gallery" id="overlayGallery"></div>
          <div class="overlay-video">
            <iframe src="" id="overlayTrailer" frameborder="0" allowfullscreen>
            </iframe>
          </div>
        </div>
      </div>
    </div>

    <footer class="container">© 2026 ARCHIE PORTFOLIO</footer>

    <script src="js/works.js"></script>
    <script src="js/menu.js"></script>
  </body>
</html>
